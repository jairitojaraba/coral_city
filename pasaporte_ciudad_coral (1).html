<!DOCTYPE html>
<html lang="es" data-lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#FF6B6B"/>
<title>Pasaporte Permanente — La Ciudad Coral</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE — MOBILE FIRST ───────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:'Nunito',sans-serif;
  background:#FFE5B4;
  color:#2D3436;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── CSS VARIABLES ─────────────────────────────────── */
:root{
  --coral:#FF6B6B;
  --coral2:#FFA07A;
  --coral-l:#FDECEA;
  --pink:#EC4899;
  --pink-l:#FCE7F3;
  --sun:#FFD93D;
  --sun2:#FFC94A;
  --sun-l:#FEF9E5;
  --sky:#5DAFFB;
  --sky-l:#E0F2FE;
  --mint:#4ECDC4;
  --mint-l:#CCFBF1;
  --lav:#C8A8E9;
  --lav-l:#F3E8FF;
  --orange:#F97316;
  --orange-l:#FFEDD5;
  --green:#10B981;
  --green-l:#D1FAE5;
  --bg:#FFF8EC;
  --bg2:#FFEDD5;
  --card:#FFFFFF;
  --text:#2D3436;
  --text2:#636E72;
  --line:#FFE8D6;
  /* Sketch colors */
  --sk1:#A855F7; --sk1l:#F3E8FF;
  --sk2:#0EA5E9; --sk2l:#E0F2FE;
  --sk3:#EC4899; --sk3l:#FCE7F3;
  --sk4:#F97316; --sk4l:#FFEDD5;
  --sk5:#EF4444; --sk5l:#FEE2E2;
  /* Safe area */
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
  /* Spacing scale */
  --space-xs:8px;
  --space-sm:12px;
  --space-md:16px;
  --space-lg:20px;
  --space-xl:24px;
  /* Touch target */
  --touch:44px;
  /* Radius */
  --r-sm:10px;
  --r-md:14px;
  --r-lg:18px;
  --r-full:50px;
}

/* ── COVER ──────────────────────────────────────────── */
#cover{
  position:fixed;inset:0;z-index:200;
  background:linear-gradient(150deg,#FFD93D 0%,#FF9F66 35%,#FF6B6B 70%,#EC4899 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(var(--sat) + 24px) calc(var(--sal) + 20px) calc(var(--sab) + 24px) calc(var(--sar) + 20px);
  text-align:center;
  transition:opacity .6s ease,transform .6s ease;
  overflow:hidden;
}
#cover.gone{opacity:0;transform:scale(1.06);pointer-events:none}
#cover::before{
  content:'';position:absolute;
  width:min(260px,70vw);height:min(260px,70vw);
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.22),transparent);
  top:-80px;right:-60px;pointer-events:none;
}
#cover::after{
  content:'';position:absolute;
  width:min(160px,45vw);height:min(160px,45vw);
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,217,61,.35),transparent);
  bottom:-40px;left:-30px;pointer-events:none;
}
.c-rainbow{position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--sk1),var(--sk2),var(--sk3),var(--sk4),var(--sk5));z-index:1}
.c-rainbow-b{top:auto;bottom:0}
.c-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:360px}

.logo-wrap{margin-bottom:14px}
.logo-wrap svg{width:min(100px,28vw);height:min(100px,28vw)}

.c-eyebrow{font-family:'Fredoka',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.9);margin-bottom:6px;text-transform:uppercase;font-weight:600}
.c-title{font-family:'Fredoka',sans-serif;font-size:clamp(28px,8vw,38px);font-weight:700;color:#fff;line-height:1;letter-spacing:-1px;text-shadow:0 3px 16px rgba(0,0,0,.15)}
.c-sub{font-family:'Caveat',cursive;font-size:clamp(24px,7vw,32px);color:#FFFBF3;margin:6px 0 16px;font-weight:700}
.c-school{font-size:11px;color:rgba(255,255,255,.8);margin-bottom:3px;font-weight:600}
.c-date{font-size:11px;color:rgba(255,255,255,.85);margin-bottom:20px;font-weight:600}
.c-divider{width:48px;height:2px;background:#FFFBF3;border-radius:2px;margin:10px auto 16px}

.btn-open{
  background:#FFFBF3;color:var(--coral);
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:14px;letter-spacing:.5px;
  border:none;padding:0 28px;height:var(--touch);border-radius:var(--r-full);
  cursor:pointer;text-transform:uppercase;
  box-shadow:0 6px 20px rgba(0,0,0,.15);
  transition:transform .12s,box-shadow .2s;
  display:flex;align-items:center;gap:6px;
  -webkit-appearance:none;appearance:none;
}
.btn-open:active{transform:scale(.95);box-shadow:0 3px 10px rgba(0,0,0,.2)}
.c-tagline{font-family:'Caveat',cursive;font-size:16px;color:rgba(255,255,255,.9);margin-top:10px;font-weight:500}

.c-lang{
  position:absolute;top:calc(var(--sat) + 14px);right:calc(var(--sar) + 14px);z-index:3;
  display:flex;background:rgba(255,255,255,.2);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-radius:var(--r-full);overflow:hidden;padding:3px;gap:2px;
}
.c-lang button{
  padding:0 12px;height:32px;font-size:11px;font-weight:700;letter-spacing:.5px;
  border:none;cursor:pointer;font-family:'Fredoka',sans-serif;
  border-radius:var(--r-full);background:transparent;color:rgba(255,255,255,.7);
  transition:all .2s;min-width:36px;
}
.c-lang button.al{background:#fff;color:var(--coral)}

/* ── APP SHELL ──────────────────────────────────────── */
#app{
  max-width:480px;margin:0 auto;min-height:100vh;
  background:var(--bg);
  display:flex;flex-direction:column;
  opacity:0;transition:opacity .35s .08s;
}
#app.vis{opacity:1}

/* ── TOP BAR ────────────────────────────────────────── */
.top-bar{
  background:#fff;
  padding:0 var(--space-sm);
  height:var(--touch);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  border-bottom:2px solid var(--bg2);
  padding-top:var(--sat);
}
.tb-left{display:flex;align-items:center;gap:8px;min-width:0}
.tb-logo{width:28px;height:28px;flex-shrink:0}
.tb-title{
  font-family:'Fredoka',sans-serif;font-size:13px;color:var(--coral);
  font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tb-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.badge{
  background:linear-gradient(135deg,var(--coral),var(--pink));
  color:#fff;font-size:9px;font-weight:700;padding:3px 8px;
  border-radius:var(--r-full);font-family:'Fredoka',sans-serif;letter-spacing:.5px;
  white-space:nowrap;
}
.lang-tog{
  display:flex;background:var(--bg2);border-radius:var(--r-full);
  overflow:hidden;padding:2px;gap:1px;
}
.lang-tog button{
  padding:0 9px;height:26px;font-size:10px;font-weight:700;
  border:none;cursor:pointer;font-family:'Fredoka',sans-serif;
  background:transparent;color:var(--text2);border-radius:var(--r-full);
  transition:all .2s;min-width:30px;
}
.lang-tog .al{background:#fff;color:var(--coral);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* ── NAV — 7 items, always visible, mobile-first ────── */
.nav{
  background:#fff;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  padding:6px 4px;
  border-bottom:3px solid var(--bg2);
  position:sticky;top:var(--touch);z-index:40;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;
  padding:6px 1px;
  min-height:var(--touch);
  font-family:'Fredoka',sans-serif;font-size:8px;font-weight:600;
  color:var(--text2);border:none;background:transparent;
  cursor:pointer;border-radius:var(--r-sm);
  transition:background .15s,color .15s,transform .12s;
  -webkit-appearance:none;appearance:none;
  letter-spacing:.2px;
}
.nav-emoji{font-size:16px;line-height:1;display:block}
.nav-lbl{display:block;font-size:8px;line-height:1.1}
.nav-btn.act{
  background:linear-gradient(135deg,var(--coral),var(--pink));
  color:#fff;
  transform:scale(1.04);
  box-shadow:0 3px 8px rgba(255,107,107,.3);
}
.nav-btn:active{transform:scale(.96)}

/* ── CONTENT ────────────────────────────────────────── */
.content{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding-bottom:calc(var(--sab) + 20px);
  background:var(--bg);
}

/* ── RAINBOW STRIP ──────────────────────────────────── */
.rainbow{
  height:4px;
  background:linear-gradient(90deg,var(--sk1),var(--sk2),var(--sk3),var(--sk4),var(--sk5));
}

/* ── PAGE HEADER ────────────────────────────────────── */
.ph{
  background:linear-gradient(135deg,#FFD93D 0%,#FFA07A 55%,#FF6B6B 100%);
  padding:var(--space-lg) var(--space-md) var(--space-md);
  position:relative;overflow:hidden;
}
.ph::after{
  content:'';position:absolute;
  width:min(120px,35vw);height:min(120px,35vw);
  border-radius:50%;background:rgba(255,255,255,.15);
  top:-30px;right:-30px;pointer-events:none;
}
.ph-ey{
  font-family:'Fredoka',sans-serif;font-size:9px;color:rgba(255,255,255,.9);
  letter-spacing:2.5px;text-transform:uppercase;margin-bottom:4px;
  font-weight:600;position:relative;z-index:1;
}
.ph-t{
  font-family:'Fredoka',sans-serif;
  font-size:clamp(18px,5.5vw,24px);
  color:#fff;font-weight:700;line-height:1.2;
  position:relative;z-index:1;
  text-shadow:0 2px 8px rgba(0,0,0,.1);
}
.ph-s{
  font-family:'Caveat',cursive;font-size:16px;
  color:rgba(255,255,255,.95);margin-top:4px;
  position:relative;z-index:1;font-weight:500;
}

/* ── CARDS ──────────────────────────────────────────── */
.card{
  background:var(--card);margin:var(--space-sm);
  border-radius:var(--r-lg);overflow:hidden;
  box-shadow:0 2px 10px rgba(255,107,107,.06),0 1px 3px rgba(0,0,0,.04);
}
.card-hd{padding:12px var(--space-md) 10px;border-bottom:2px dashed var(--line)}
.card-hd-l{font-family:'Fredoka',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:3px;color:var(--text2)}
.card-hd-t{font-family:'Fredoka',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.card-bd{padding:var(--space-sm) var(--space-md)}
.card-bd p{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:9px;font-weight:500}
.card-bd p:last-child{margin-bottom:0}

/* ── JOY CARDS ──────────────────────────────────────── */
.jcard{
  margin:var(--space-sm);border-radius:var(--r-lg);padding:var(--space-md);
  position:relative;overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}
.jcard::after{
  content:'';position:absolute;
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.18);top:-20px;right:-20px;pointer-events:none;
}
.jcard-coral{background:linear-gradient(135deg,#FFB088,#FF6B6B);color:#fff}
.jcard-sky{background:linear-gradient(135deg,#7DD3FC,#5DAFFB);color:#fff}
.jcard-sun{background:linear-gradient(135deg,#FFE066,#FFD93D);color:var(--text)}
.jcard-mint{background:linear-gradient(135deg,#6EE7B7,#4ECDC4);color:#fff}
.jcard-pink{background:linear-gradient(135deg,#F9A8D4,#EC4899);color:#fff}
.jcard-icon{font-size:26px;margin-bottom:6px;position:relative;z-index:1}
.jcard-title{font-family:'Fredoka',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;position:relative;z-index:1}
.jcard-text{font-size:14px;line-height:1.7;font-weight:500;position:relative;z-index:1}

/* ── QUOTE ──────────────────────────────────────────── */
.quote{
  background:linear-gradient(135deg,#FFE066,#FFD93D);
  padding:var(--space-lg) var(--space-md);margin:var(--space-sm);
  border-radius:var(--r-lg);text-align:center;position:relative;overflow:hidden;
  box-shadow:0 4px 14px rgba(255,217,61,.3);
}
.quote::before{
  content:'"';position:absolute;top:-14px;left:10px;
  font-size:80px;color:rgba(255,255,255,.45);
  font-family:'Fredoka',sans-serif;line-height:1;font-weight:700;
}
.quote-t{font-family:'Fredoka',sans-serif;font-size:15px;color:var(--text);line-height:1.5;position:relative;z-index:1;font-weight:600}
.quote-a{font-family:'Caveat',cursive;font-size:17px;color:var(--coral);margin-top:8px;font-weight:700;position:relative;z-index:1}

/* ── SECRETS GRID — single col < 360, two col >= 360 ── */
.secrets{
  display:flex;flex-direction:column;gap:var(--space-xs);
  margin:var(--space-sm);
}
@media(min-width:360px){
  .secrets{display:grid;grid-template-columns:1fr 1fr}
}
.secret{
  background:var(--card);border-radius:var(--r-md);padding:var(--space-sm);
  text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.05);
}
.s1{border-top:3px solid var(--sky)}
.s2{border-top:3px solid var(--pink)}
.secret-icon{font-size:24px;margin-bottom:6px}
.secret-title{font-family:'Fredoka',sans-serif;font-size:11px;font-weight:700;margin-bottom:5px}
.s1 .secret-title{color:var(--sky)}
.s2 .secret-title{color:var(--pink)}
.secret-text{font-size:13px;color:var(--text);line-height:1.55;font-weight:500}

/* ── TRM ────────────────────────────────────────────── */
.trm-obj{
  background:linear-gradient(135deg,#38BDF8,#4ECDC4);
  margin:var(--space-sm);border-radius:var(--r-lg);padding:var(--space-md);
  color:#fff;position:relative;overflow:hidden;
  box-shadow:0 4px 14px rgba(93,175,251,.2);
}
.trm-obj::after{content:'';position:absolute;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.12);bottom:-20px;left:-15px;pointer-events:none}
.trm-obj-label{font-family:'Fredoka',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-weight:700;position:relative;z-index:1}
.trm-obj-text{font-size:14px;line-height:1.7;font-weight:500;position:relative;z-index:1}

/* TRM lines — single col mobile, two col >= 360px */
.trm-lines{
  display:flex;flex-direction:column;gap:var(--space-xs);
  margin:var(--space-sm);
}
@media(min-width:360px){
  .trm-lines{display:grid;grid-template-columns:1fr 1fr}
}
.tl{border-radius:var(--r-md);padding:var(--space-sm);box-shadow:0 3px 10px rgba(0,0,0,.06)}
.tl1{background:linear-gradient(135deg,#FFE066,#FF9F66);color:var(--text)}
.tl2{background:linear-gradient(135deg,#A78BFA,#7C3AED);color:#fff}
.tl-title{font-family:'Fredoka',sans-serif;font-size:12px;font-weight:700;margin-bottom:7px}
.tl ul{list-style:none}
.tl li{font-size:12px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.15);font-weight:600}
.tl li:last-child{border:none}
.tl li::before{content:"▸ ";font-weight:700}

.trm-conv{
  text-align:center;margin:0 var(--space-sm) var(--space-xs);
  padding:10px;background:var(--card);border-radius:var(--r-md);
  font-family:'Fredoka',sans-serif;font-size:12px;color:var(--text);font-weight:600;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.trm-conv strong{color:var(--coral);font-size:13px;font-weight:800}

/* TRM fase — single col, 2x2 from 360px */
.trm-fase{margin:var(--space-sm)}
.trm-fase-t{font-family:'Fredoka',sans-serif;font-size:14px;color:var(--text);margin-bottom:10px;text-align:center;font-weight:700}
.trm-fase-grid{
  display:flex;flex-direction:column;gap:var(--space-xs);
}
@media(min-width:360px){
  .trm-fase-grid{display:grid;grid-template-columns:1fr 1fr}
}
.tf-item{background:var(--card);border-radius:var(--r-md);padding:var(--space-sm);box-shadow:0 2px 8px rgba(0,0,0,.05);border-top:3px solid}
.tf-num{font-family:'Fredoka',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px;line-height:1}
.tf-label{font-family:'Fredoka',sans-serif;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;opacity:.8}
.tf-text{font-size:12px;line-height:1.55;color:var(--text);font-weight:500}

/* ── SCHEDULE ───────────────────────────────────────── */
.sched{margin:var(--space-sm)}
.sched-sep{
  background:linear-gradient(135deg,var(--coral),var(--pink));
  color:#fff;font-family:'Fredoka',sans-serif;font-size:10px;letter-spacing:1.5px;
  text-align:center;padding:6px var(--space-sm);font-weight:700;text-transform:uppercase;
  border-radius:var(--r-full);margin:6px 0 4px;
}
.sched-row{
  display:flex;align-items:stretch;margin-bottom:3px;
  border-radius:var(--r-sm);overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.sched-t{
  flex:0 0 56px;display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka',sans-serif;font-size:10px;font-weight:700;
  padding:9px 3px;text-align:center;color:#fff;line-height:1.2;
}
.sched-i{flex:1;padding:9px var(--space-sm);background:var(--card)}
.sched-title{font-family:'Fredoka',sans-serif;font-weight:700;font-size:12px;color:var(--text);line-height:1.3}
.sched-sub{font-size:10px;color:var(--text2);margin-top:2px;font-weight:500}

/* ── BARRIO TABS ────────────────────────────────────── */
.barrio-tabs{
  display:flex;gap:7px;
  padding:var(--space-sm) var(--space-sm) 0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.barrio-tabs::-webkit-scrollbar{display:none}
.btab{
  flex:0 0 auto;
  padding:0 14px;height:36px;
  border-radius:var(--r-full);border:2px solid var(--bg2);
  font-family:'Fredoka',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;
  background:var(--card);color:var(--text2);
  display:flex;align-items:center;gap:4px;
  white-space:nowrap;
}
.btab.act{color:#fff;border-color:transparent;box-shadow:0 4px 10px rgba(0,0,0,.14)}

/* ── MUSICAL POSTER ─────────────────────────────────── */
.poster{
  width:100%;height:min(150px,42vw);
  position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.poster-ov{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;
}
.poster-emoji{font-size:38px;margin-bottom:5px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4))}
.poster-musical{
  font-family:'Fredoka',sans-serif;font-size:clamp(15px,4.5vw,20px);
  font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);
  text-align:center;line-height:1.1;
}
.poster-year{font-family:'Caveat',cursive;font-size:14px;color:rgba(255,255,255,.95);margin-top:3px;font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,.4)}
.poster-badge{
  position:absolute;top:10px;right:10px;
  background:#fff;color:var(--text);
  font-family:'Fredoka',sans-serif;font-size:9px;font-weight:800;
  padding:4px 9px;border-radius:var(--r-full);letter-spacing:.5px;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.poster-addams{background:linear-gradient(135deg,#5B21B6,#A855F7,#C084FC)}
.poster-newsies{background:linear-gradient(135deg,#0369A1,#0EA5E9,#38BDF8)}
.poster-grease{background:linear-gradient(135deg,#9D174D,#EC4899,#F472B6)}
.poster-heights{background:linear-gradient(135deg,#C2410C,#F97316,#FB923C)}
.poster-lesmis{background:linear-gradient(135deg,#991B1B,#EF4444,#F87171)}

/* ── BARRIO CARD ────────────────────────────────────── */
.bcard{margin:var(--space-xs) var(--space-sm) 0;border-radius:var(--r-lg);overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.bcard-hd{padding:var(--space-sm) var(--space-md);color:#fff}
.bcard-grupos{
  display:inline-block;padding:3px 9px;border-radius:var(--r-full);
  font-family:'Fredoka',sans-serif;font-size:10px;font-weight:700;
  background:rgba(255,255,255,.22);margin-top:6px;
}
.bsec{padding:var(--space-sm) var(--space-md);border-bottom:2px dashed var(--line)}
.bsec:last-child{border:none}
.bsec-label{font-family:'Fredoka',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--text2);margin-bottom:6px}
.bsec-text{font-size:14px;line-height:1.7;color:var(--text);font-weight:500}
.msg-box{padding:11px 13px;border-radius:var(--r-sm);font-family:'Caveat',cursive;font-size:17px;line-height:1.4;font-weight:600}
.extra-item{padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;color:var(--text);line-height:1.6;font-weight:500}
.extra-item:last-child{border:none}
.extra-bullet{font-weight:800;margin-right:5px}

/* ── EXTERNAL BUTTONS ───────────────────────────────── */
.ext-btns{display:flex;flex-direction:column;gap:7px;padding:var(--space-sm) var(--space-md)}
.ext-btn{
  display:flex;align-items:center;gap:10px;
  padding:0 var(--space-sm);min-height:var(--touch);
  border-radius:var(--r-md);border:none;cursor:pointer;
  text-align:left;text-decoration:none;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  transition:transform .12s,box-shadow .2s;
  -webkit-appearance:none;appearance:none;
}
.ext-btn:active{transform:scale(.97);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.ext-btn-icon{font-size:20px;flex:0 0 24px}
.ext-btn-title{font-family:'Fredoka',sans-serif;font-size:13px;font-weight:700;display:block;line-height:1.2}
.ext-btn-sub{font-size:11px;opacity:.82;display:block;margin-top:2px;font-weight:600}

/* ── KAHOOT BOX ─────────────────────────────────────── */
.kahoot{
  background:linear-gradient(135deg,#6EE7B7,var(--green));
  color:#fff;border-radius:var(--r-md);
  padding:var(--space-sm) var(--space-md);
  margin:0 var(--space-md) var(--space-md);
  box-shadow:0 3px 10px rgba(16,185,129,.2);
}
.kahoot-lbl{font-family:'Fredoka',sans-serif;font-size:9px;letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.kahoot-q{font-size:13px;margin-bottom:4px;font-weight:600;opacity:.95}
.kahoot-a{font-family:'Fredoka',sans-serif;font-size:14px;font-weight:700}

/* ── CONTEST ────────────────────────────────────────── */
.citem{background:var(--card);margin:10px var(--space-sm) 0;border-radius:var(--r-md);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.citem-hd{display:flex;align-items:center;gap:10px;padding:var(--space-sm) var(--space-md)}
.citem-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-size:14px;font-weight:800;color:#fff;flex:0 0 32px}
.citem-barrio{font-family:'Fredoka',sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.citem-q{font-size:13px;color:var(--text);font-weight:600;line-height:1.3}
.citem-ans{padding:7px var(--space-md) 11px 54px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:13px;color:var(--green);border-top:2px dashed var(--line);background:#FAFEFD}
.citem-ans-lbl{font-size:8px;letter-spacing:1px;color:var(--text2);text-transform:uppercase;font-weight:700;display:block;margin-bottom:2px}

/* ── EVAL ───────────────────────────────────────────── */
.eval-hero{
  background:linear-gradient(135deg,#FF9F66,#FF6B6B,#EC4899);
  margin:var(--space-sm);border-radius:var(--r-lg);padding:var(--space-xl) var(--space-md);
  text-align:center;position:relative;overflow:hidden;color:#fff;
  box-shadow:0 6px 20px rgba(255,107,107,.28);
}
.eval-hero::after{content:'';position:absolute;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.12);top:-30px;right:-30px;pointer-events:none}
.eval-hero::before{content:'';position:absolute;width:70px;height:70px;border-radius:50%;background:rgba(255,217,61,.25);bottom:-25px;left:-15px;pointer-events:none}
.eval-icon{font-size:36px;margin-bottom:9px;position:relative;z-index:1}
.eval-title{font-family:'Fredoka',sans-serif;font-size:18px;margin-bottom:7px;font-weight:700;position:relative;z-index:1}
.eval-text{font-size:14px;color:rgba(255,255,255,.95);line-height:1.7;margin-bottom:18px;font-weight:500;position:relative;z-index:1}
.btn-eval{
  display:inline-flex;align-items:center;justify-content:center;
  background:#fff;color:var(--coral);
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px;
  text-decoration:none;padding:0 24px;height:var(--touch);border-radius:var(--r-full);
  box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative;z-index:1;
  transition:transform .12s;
  -webkit-appearance:none;appearance:none;
}
.btn-eval:active{transform:scale(.96)}

/* ── QR SECTION ─────────────────────────────────────── */
.qr-sec{margin:var(--space-sm);background:var(--card);border-radius:var(--r-lg);padding:var(--space-md);box-shadow:0 2px 10px rgba(0,0,0,.05);text-align:center}
.qr-t{font-family:'Fredoka',sans-serif;font-size:15px;color:var(--text);margin-bottom:6px;font-weight:700}
.qr-s{font-size:12px;color:var(--text2);margin-bottom:14px;font-weight:500}
.qr-inp{
  width:100%;border:2px solid var(--bg2);border-radius:var(--r-md);
  padding:0 var(--space-sm);height:var(--touch);
  font-size:14px;font-family:'Nunito',sans-serif;outline:none;
  transition:border-color .2s;font-weight:600;background:var(--bg);
  -webkit-appearance:none;appearance:none;
}
.qr-inp:focus{border-color:var(--coral)}
.btn-qr{
  background:linear-gradient(135deg,var(--coral),var(--pink));color:#fff;border:none;
  font-family:'Fredoka',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;
  padding:0 var(--space-md);height:var(--touch);border-radius:var(--r-full);
  cursor:pointer;width:100%;margin-top:var(--space-xs);
  box-shadow:0 4px 12px rgba(255,107,107,.28);
  -webkit-appearance:none;appearance:none;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-qr:active{transform:scale(.97)}
#qrbox{margin-top:var(--space-md);display:none}
#qrbox img{width:160px;height:160px;border:3px solid var(--coral);border-radius:var(--r-md)}
#qrbox p{font-size:11px;color:var(--text2);margin-top:7px;font-weight:600}

/* ── DEPLOY CARD ────────────────────────────────────── */
.deploy{
  background:linear-gradient(135deg,#FEF7E5,#FEF3C7);
  border:2px solid var(--sun);margin:var(--space-sm);
  border-radius:var(--r-md);padding:var(--space-md);
}
.deploy-t{font-family:'Fredoka',sans-serif;font-size:13px;color:var(--text);margin-bottom:10px;font-weight:700}
.dstep{display:flex;gap:9px;margin-bottom:8px;align-items:flex-start}
.dnum{
  width:22px;height:22px;
  background:linear-gradient(135deg,var(--coral),var(--pink));
  color:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka',sans-serif;font-size:11px;font-weight:800;flex:0 0 22px;
}
.dtext{font-size:12px;color:var(--text);line-height:1.55;font-weight:500;padding-top:3px}
.dtext a{color:var(--coral);font-weight:700}

/* ── STAMPS ─────────────────────────────────────────── */
.stamps{display:flex;flex-wrap:wrap;gap:6px;padding:0 var(--space-sm) var(--space-sm)}
.stamp{padding:5px 11px;border-radius:var(--r-full);font-family:'Fredoka',sans-serif;font-size:10px;font-weight:700;color:#fff;letter-spacing:.3px}

/* ── PAGE NUM ───────────────────────────────────────── */
.pnum{text-align:center;padding:var(--space-md) var(--space-md) 4px;font-family:'Caveat',cursive;font-size:14px;color:var(--text2);font-weight:600}

/* ── TAGS ───────────────────────────────────────────── */
.tag{display:inline-block;padding:5px 11px;border-radius:var(--r-full);font-family:'Fredoka',sans-serif;font-size:10px;font-weight:700;margin:2px;color:#fff}
</style>
</head>

};
const BARRIOS={
  es:[
    {id:1,num:"BARRIO 1",nombre:"La Mansión del Eco",sketch:"Familia Addams",grupos:"Grupos 6A y 6B",color:"#A855F7",light:"#F3E8FF",icon:"🕸️",año:"Musical de Broadway · 2010",pc:"poster-addams",desc:"La Familia Addams nació en 1938 como una caricatura de Charles Addams para la revista <em>The New Yorker</em>. Al principio no tenían nombres; fue la serie de televisión de 1964 quien les dio identidad. El musical de Broadway, con música de Andrew Lippa y libro de Marshall Brickman y Rick Elice, abrió en abril de 2010 con Nathan Lane como Gómez y Bebe Neuwirth como Morticia. Es la primera obra de teatro basada en estos personajes.",story:"Wednesday Addams, hija de la familia, tiene novio por primera vez: un joven completamente normal. La historia explora, con humor oscuro, qué significa ser fiel a quien uno es cuando el mundo espera que seas otro.",msg:"Ser diferente no es un defecto. Es el primer paso para ser libre. ✨",videoUrl:"https://www.youtube.com/results?search_query=addams+family+musical+broadway",wikiUrl:"https://en.wikipedia.org/wiki/The_Addams_Family_(musical)",facts:["El chasquido de dos dedos fue inventado para la serie de televisión de 1964, no estaba en las caricaturas originales.","El nombre Wednesday (Merlina) viene de un verso inglés: 'Wednesday's child is full of woe'.","Corrió 725 funciones en Broadway y fue visto por más de 748.000 personas. Recaudó más de 62 millones de dólares.","Fue el primer show en producir más de 12 millones en una prueba en Chicago antes de llegar a Broadway."],kq:"¿En qué año apareció por primera vez la Familia Addams?",ka:"1938 — en la revista The New Yorker"},
    {id:2,num:"BARRIO 2",nombre:"El Callejón de los Titulares",sketch:"Newsies",grupos:"Grupo 6C",color:"#0EA5E9",light:"#E0F2FE",icon:"📰",año:"Musical de Broadway · 2012",pc:"poster-newsies",desc:"Newsies está basada en hechos reales. En 1899, los niños vendedores de periódicos de Nueva York le declararon la huelga a Joseph Pulitzer y William Randolph Hearst. Disney hizo una película en 1992. El musical de Broadway llegó en 2012, con música de Alan Menken.",story:"Los newsboys compraban periódicos con su propio dinero y los revendían. Si no los vendían, perdían. Cuando los dueños subieron el precio, los niños dijeron que no. La huelga duró dos semanas. Siete mil newsboys marcharon juntos. Al final, los más poderosos cedieron.",msg:"La diferencia entre el poder y quien no lo tiene no la gana siempre el más fuerte. ✨",videoUrl:"https://www.youtube.com/watch?v=fHk9AG6X6sQ",wikiUrl:"https://en.wikipedia.org/wiki/Newsies_(musical)",facts:["El líder real de la huelga se llamaba 'Kid Blink', un joven tuerto con acento de Brooklyn. Base del personaje Jack Kelly.","El 24 de julio de 1899, siete mil newsboys de los cinco distritos de NYC marcharon juntos.","Ganó 2 premios Tony en 2012: Mejor Partitura Original y Mejor Coreografía.","Corrió más de 1.000 funciones en Broadway."],kq:"¿En qué año ocurrió la huelga real de los newsboys?",ka:"1899 — en las calles de Nueva York"},

    {id:4,num:"BARRIO 4",nombre:"Las Alturas del Barrio",sketch:"In the Heights — Carnaval del Barrio",grupos:"Grupos 7B y 7C",color:"#F97316",light:"#FFEDD5",icon:"🌟",año:"Musical de Broadway · 2008",pc:"poster-heights",desc:"Lin-Manuel Miranda tenía 19 años cuando empezó a escribir este musical en la universidad. Tardó 9 años en terminarlo. Broadway el 9 de marzo de 2008. Ganó 4 premios Tony: Mejor Musical, Mejor Partitura, Mejor Coreografía y Mejor Orquestación.",story:"Washington Heights, un barrio latino en NY que enfrenta la gentrificación. 'Carnaval del Barrio': un apagón en plena ola de calor lleva al barrio a salir a la calle con banderas de cada país latinoamericano y celebrar quiénes son.",msg:"La identidad no se pierde cuando sales del barrio. Se lleva. ✨",videoUrl:"https://www.youtube.com/results?search_query=in+the+heights+carnaval+del+barrio+2021",wikiUrl:"https://en.wikipedia.org/wiki/In_the_Heights",facts:["El nombre del protagonista, Usnavi, viene de un barco de la US NAVY que sus padres vieron al llegar a América.","La partitura mezcla hip-hop, salsa, merengue, R&B y teatro musical.","Los personajes cambian entre inglés y español dentro de las mismas canciones.","Miranda luego crearía Hamilton (2015), ganador del Pulitzer y 11 premios Tony."],kq:"¿Quién escribió In the Heights?",ka:"Lin-Manuel Miranda (también creador de Hamilton)"},

let lang='es',curBarrio=0,curPage='bienvenida';

function setLang(l){
  lang=l;
  document.documentElement.setAttribute('data-lang',l);
  document.getElementById('cv-btn').textContent=TX[l].cvBtn;
  document.getElementById('cv-tag').textContent=TX[l].cvTag;
  document.getElementById('app-title').textContent=TX[l].appTitle;
  document.getElementById('app-badge').textContent=TX[l].badge;
  document.querySelectorAll('.nav-lbl').forEach((el,i)=>{el.textContent=TX[l].nav[i]});
  ['es','en'].forEach(x=>{
    document.getElementById('cov-'+x).className=x===l?'al':'';
    document.getElementById('btn-'+x).className=x===l?'al':'';
  });
  showPage(curPage,document.querySelector('.nav-btn.act'));
}

function openPassport(){
  document.getElementById('cover').classList.add('gone');
  const app=document.getElementById('app');
  app.style.display='flex';
  setTimeout(()=>app.classList.add('vis'),60);
  showPage('bienvenida',document.querySelector('.nav-btn'));
}

function showPage(id,btn){
  curPage=id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('act'));
  if(btn)btn.classList.add('act');
  const c=document.getElementById('content');
  const pages={bienvenida:pBienvenida,ciudad:pCiudad,roadmap:pRoadmap,programa:pPrograma,barrios:pBarrios,concurso:pConcurso,evalua:pEvalua};
  c.innerHTML=pages[id]?pages[id]():'';
  c.scrollTop=0;
}

<div class="ph"><div class="ph-ey">${t?'Los 5 Barrios':'The 5 Neighborhoods'}</div><div class="ph-t">${t?'¡Sketches Musicales!':'Musical Sketches!'}</div></div>
<div class="barrio-tabs">${tabs}</div>
<div class="bcard">
<div class="poster ${b.pc}"><div class="poster-ov"><div class="poster-emoji">${b.icon}</div><div class="poster-musical">${b.sketch}</div><div class="poster-year">${b.año}</div></div><span class="poster-badge">${b.num}</span></div>
<div class="bcard-hd" style="background:${b.color}"><div style="font-family:'Fredoka',sans-serif;font-size:9px;letter-spacing:2px;opacity:.85;text-transform:uppercase;margin-bottom:2px">${b.num}</div><div style="font-family:'Fredoka',sans-serif;font-size:16px;font-weight:700">${b.nombre}</div><span class="bcard-grupos">${b.grupos}</span></div>
<div class="bsec"><div class="bsec-label">${t?'El musical':'The musical'}</div><div class="bsec-text">${b.desc}</div></div>
<div class="bsec"><div class="bsec-label">${t?'La historia':'The story'}</div><div class="bsec-text">${b.story}</div></div>
<div class="bsec"><div class="bsec-label">${t?'El mensaje':'The message'}</div><div class="msg-box" style="background:${b.light};color:${b.color}">${b.msg}</div></div>
<div class="bsec"><div class="bsec-label">${t?'Datos curiosos':'Fun facts'}</div>${b.facts.map(f=>`<div class="extra-item"><span class="extra-bullet" style="color:${b.color}">✦</span>${f}</div>`).join('')}</div>
<div class="ext-btns">
<a href="${b.videoUrl}" target="_blank" rel="noopener" class="ext-btn" style="background:${b.color};color:#fff"><span class="ext-btn-icon">▶️</span><div><span class="ext-btn-title">${TX[lang].videoBtn}</span><span class="ext-btn-sub" style="color:rgba(255,255,255,.8)">${b.sketch} →</span></div></a>

</div>
<div class="kahoot"><div class="kahoot-lbl">${TX[lang].kahootLabel}</div><div class="kahoot-q">${b.kq}</div><div class="kahoot-a">→ ${b.ka}</div></div>
</div>
<div class="pnum" style="margin-top:8px">${t?'Pág. 5 · Los Cinco Barrios':'Page 5 · The Five Neighborhoods'}</div>`;
}
function switchB(i){curBarrio=i;showPage('barrios',document.querySelector('.nav-btn.act'))}

function pEvalua(){
  const t=lang==='es';
  return`<div class="rainbow"></div>
<div class="ph"><div class="ph-ey">${t?'Tu opinión nos importa':'Your feedback matters'}</div><div class="ph-t">${t?'¡Evalúa tu visita!':'Evaluate your visit!'}</div></div>
<div class="eval-hero" style="margin-top:12px"><div class="eval-icon">⭐</div><div class="eval-title">${t?'¿Cómo fue tu experiencia?':'How was your experience?'}</div><div class="eval-text">${t?'Tres minutos. Siete preguntas. Tu respuesta ayuda a que La Ciudad Coral sea mejor cada año.':'Three minutes. Seven questions. Your answer helps make The Coral City better every year.'}</div><a href="https://forms.cloud.microsoft/r/miFSh18LBW" target="_blank" rel="noopener" class="btn-eval">${TX[lang].evalBtn}</a></div>

<div class="qr-sec"><div class="qr-t">${t?'Generador de QR':'QR Generator'}</div><div class="qr-s">${t?'Pega la URL donde publicarás el pasaporte':'Paste the URL where you will publish the passport'}</div><input class="qr-inp" type="url" id="qr-url" placeholder="https://tu-pasaporte.netlify.app" inputmode="url"/><button class="btn-qr" onclick="genQR()">✨ ${t?'GENERAR CÓDIGO QR':'GENERATE QR CODE'} ✨</button><div id="qrbox"><img id="qr-img" src="" alt="QR"/><p>${t?'Descarga e imprime para el evento':'Download and print for the event'}</p></div></div>
<div class="deploy"><div class="deploy-t">${t?'🚀 Publicar en 3 pasos (gratis)':'🚀 Publish in 3 steps (free)'}</div>

<div class="dstep"><div class="dnum">2</div><div class="dtext">${t?`Ve a <a href="https://app.netlify.com/drop" target="_blank">app.netlify.com/drop</a>, arrastra el archivo. URL lista en 10 segundos.`:`Go to <a href="https://app.netlify.com/drop" target="_blank">app.netlify.com/drop</a>, drag the file. URL ready in 10 seconds.`}</div></div>
<div class="dstep"><div class="dnum">3</div><div class="dtext">${t?'Pega la URL arriba y descarga el QR. Imprímelo para la entrada.':'Paste the URL above and download the QR. Print it for the entrance.'}</div></div>
</div>
<div class="pnum">${t?'Pág. 7 · Evalúa tu Visita':'Page 7 · Evaluate Your Visit'}</div>`;

function genQR(){
  const url=document.getElementById('qr-url').value.trim();
  if(!url){alert(lang==='es'?'Por favor ingresa la URL del pasaporte':'Please enter the passport URL');return;}
  document.getElementById('qr-img').src=`https://api.qrserver.com/v1/create-qr-code/?size=300x300&color=FF6B6B&bgcolor=FFFBF3&data=${encodeURIComponent(url)}`;
  document.getElementById('qrbox').style.display='block';
}

window.onload=function(){document.getElementById('app').style.display='none'};
</script>
